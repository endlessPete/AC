<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lager</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .blocked {
      display: none;
      text-align: center;
    }

    .image-container {
      display: none;
    }

    img {
      max-width: 100%;
      max-height: 100vh;
    }

    h1 { margin-bottom: 10px; }
    p { opacity: 0.7; }
  </style>
</head>
<body>

<div class="blocked" id="blocked">
  <div>
    <h1>content not available</h1>
    <p id="returnTime"></p>
  </div>
</div>

<div class="image-container" id="content">
  <img src="annie_chan.png" alt="Lager">
</div>

<script>
  const now = new Date();
  const hour = now.getHours();
  const minutes = now.getMinutes();

  if (hour === 1) {
    const remainingMinutes = 60 - minutes;

    document.getElementById("blocked").style.display = "flex";
    document.getElementById("returnTime").innerText =
      "come back around in " + remainingMinutes + " minute" +
      (remainingMinutes !== 1 ? "s" : "");
  } else {
    document.getElementById("content").style.display = "block";
  }
</script>

</body>
</html>
